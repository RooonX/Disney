<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书境传奇 - 官网首页</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 页面基础容器（1920×1080 固定画布） */
        .page-container {
            width: 1920px;
            height: 1080px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        /* 1. 背景图样式 */
        .bg-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持背景图比例填充 */
        }

        /* 2. 导航栏样式（固定顶部） */
        .nav-bar {
            width: 100%;
            height: 80px; /* 适配导航底版高度，可调整 */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("./nav-bg.png") center center no-repeat; /* 附件2导航底版，替换为你的路径 */
            background-size: 100% 100%;
        }
        .nav-items {
            width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-item {
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 10px 20px;
            position: relative;
            transition: all 0.3s ease;
        }
        /* 导航选中效果：文字放大+高亮+底标 */
        .nav-item.active {
            font-size: 22px;
            color: #ffd700; /* 金色高亮，可调整 */
            font-weight: bold;
        }
        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 10px;
            background: url("./nav-active.png") center center no-repeat; /* 附件3选中底标，替换为你的路径 */
            background-size: 100% 100%;
        }
        /* Logo 容器（导航中间） */
        .nav-logo {
            width: 120px;
            height: 80px;
            background: url("./logo.png") center center no-repeat; /* 游戏Logo，替换为你的路径 */
            background-size: contain;
        }

        /* 3. 大标题样式 */
        .title-layer {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }
        .title-img {
            width: 800px; /* 适配标题尺寸，可调整 */
            height: auto;
        }

        /* 4. 魔法书样式（悬浮+发光+粒子效果） */
        .magic-book-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -20%);
            z-index: 6;
            animation: float 3s ease-in-out infinite; /* 悬浮动画 */
        }
        .magic-book {
            width: 300px; /* 适配魔法书尺寸，可调整 */
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); /* 发光效果 */
            position: relative;
        }
        /* 魔法粒子光效 */
        .magic-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, rgba(255,215,0,0) 70%);
            border-radius: 50%;
            animation: glow 2s ease-in-out infinite alternate;
        }
        /* 悬浮动画 */
        @keyframes float {
            0% { transform: translate(-50%, -20%); }
            50% { transform: translate(-50%, -15%); }
            100% { transform: translate(-50%, -20%); }
        }
        /* 发光动画 */
        @keyframes glow {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* 5. 预约按钮样式 */
        .btn-layer {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 7;
        }
        .reserve-btn {
            width: 300px; /* 适配按钮尺寸，可调整 */
            height: 80px;
            border: none;
            cursor: pointer;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            font-size: 0; /* 隐藏文字，用图片展示 */
        }
        /* 成为管理员按钮（默认状态） */
        .btn-admin {
            background-image: url("./btn-admin.png"); /* 附件7，替换为你的路径 */
        }
        /* 预约成功按钮（切换状态） */
        .btn-success {
            background-image: url("./btn-success.png"); /* 附件8，替换为你的路径 */
            display: none; /* 默认隐藏 */
        }

        /* 6. 弹窗样式（含黑色遮罩） */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 50%透明度黑色遮罩 */
            z-index: 200;
            display: none; /* 默认隐藏 */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 600px; /* 适配弹窗尺寸，可调整 */
            height: 700px;
            background: url("./modal.png") center center no-repeat; /* 附件9弹窗素材，替换为你的路径 */
            background-size: 100% 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 120px;
        }
        .modal-btns {
            display: flex;
            gap: 40px;
        }
        .modal-btn {
            width: 180px;
            height: 60px;
            border: none;
            cursor: pointer;
            background-color: #ffd700;
            color: #333;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }
        .modal-btn:hover {
            background-color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 1. 背景图 -->
        <div class="bg-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bg_1.png" alt="背景图" class="bg-img"> <!-- 附件4，替换为你的路径 -->
        </div>

        <!-- 2. 导航栏 -->
        <div class="nav-bar">
            <div class="nav-items">
                <div class="nav-item active">官网首页</div>
                <div class="nav-item">魔法小镇</div>
                <div class="nav-logo"></div> <!-- Logo 中间位置 -->
                <div class="nav-item">游戏特色</div>
                <div class="nav-item">小镇简报</div>
            </div>
        </div>

        <!-- 3. 大标题 -->
        <div class="title-layer">
            <img src="./title.png" alt="大标题" class="title-img"> <!-- 附件5，替换为你的路径 -->
        </div>

        <!-- 4. 魔法书（含粒子光效） -->
        <div class="magic-book-layer">
            <div class="magic-particles"></div>
            <img src="./magic-book.png" alt="魔法书" class="magic-book"> <!-- 附件6，替换为你的路径 -->
        </div>

        <!-- 5. 预约按钮 -->
        <div class="btn-layer">
            <button class="reserve-btn btn-admin" id="adminBtn">成为管理员</button>
            <button class="reserve-btn btn-success" id="successBtn">预约成功</button>
        </div>

        <!-- 6. 弹窗（含遮罩） -->
        <div class="modal-mask" id="modalMask">
            <div class="modal-content">
                <div class="modal-btns">
                    <button class="modal-btn" id="groupBtn">加入官群</button>
                    <button class="modal-btn" id="returnBtn">确认返回</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const adminBtn = document.getElementById('adminBtn');
        const successBtn = document.getElementById('successBtn');
        const modalMask = document.getElementById('modalMask');
        const returnBtn = document.getElementById('returnBtn');
        const navItems = document.querySelectorAll('.nav-item');

        // 1. 导航栏选中效果
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                // 移除所有选中状态
                navItems.forEach(nav => nav.classList.remove('active'));
                // 添加当前选中状态
                item.classList.add('active');
            });
        });

        // 2. 点击「成为管理员」弹出弹窗
        adminBtn.addEventListener('click', () => {
            modalMask.style.display = 'flex';
        });

        // 3. 点击「确认返回」关闭弹窗，切换按钮状态
        returnBtn.addEventListener('click', () => {
            modalMask.style.display = 'none';
            adminBtn.style.display = 'none';
            successBtn.style.display = 'block';
        });

        // 4. 「加入官群」按钮点击事件（可扩展跳转逻辑）
        document.getElementById('groupBtn').addEventListener('click', () => {
            alert('已跳转至官群页面！'); // 替换为实际跳转逻辑
        });
    </script>
</body>
</html>
