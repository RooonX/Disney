<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书境传奇 - 官网首页</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 页面基础容器（适配浏览器窗口） */
        .page-container {
            width: 100vw; /* 视口宽度 */
            height: 100vh; /* 视口高度 */
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        /* 1. 背景图样式（适配浏览器） */
        .bg-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .bg-img {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* 保持比例填充整个视口 */
        }

        /* 2. 导航栏样式（置顶+文案层级在上+文案上移） */
        .nav-bar {
            width: 100%;
            height: 204px;
            position: absolute;
            top: 0; /* 紧贴顶部 */
            left: 0;
            z-index: 100; /* 确保高于底版背景 */
            display: flex;
            align-items: flex-start; /* 关键：垂直靠上对齐，替代原来的center */
            justify-content: center;
            padding-top: 20px; /* 可调整这个值控制文案上移/下移，数值越小越靠上 */
            background: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/top.png") center center no-repeat;
            background-size: 100% 100%;
        }
        .nav-items {
            width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-item {
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 10px 20px;
            position: relative;
            transition: all 0.3s ease;
            z-index: 101; /* 确保文案在导航底版之上 */
            /* 可选：如果想更精细调整，可加margin-top负值，比如 margin-top: -10px; */
        }
        /* 导航选中效果：文字放大+高亮+底标 */
        .nav-item.active {
            font-size: 22px;
            color: #ffd700;
            font-weight: bold;
        }
        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 10px;
            background: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/xuanz.png") center center no-repeat;
            background-size: 100% 100%;
        }
        /* Logo 容器（导航中间） */
        .nav-logo {
            width: 120px;
            height: 80px;
            background: url("./logo.png") center center no-repeat;
            background-size: contain;
            z-index: 101; /* Logo层级在上 */
        }

        /* 3. 大标题样式 */
        .title-layer {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }
        .title-img {
            width: 800px;
            height: auto;
        }

        /* 4. 魔法书样式（仅保留悬浮，移除发光+粒子效果） */
        .magic-book-layer {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -20%);
            z-index: 6;
            animation: float 3s ease-in-out infinite; /* 仅保留悬浮动画 */
        }
        .magic-book {
            width: 300px;
            height: auto;
            /* 移除发光特效 */
            position: relative;
        }
        /* 悬浮动画（保留） */
        @keyframes float {
            0% { transform: translate(-50%, -20%); }
            50% { transform: translate(-50%, -15%); }
            100% { transform: translate(-50%, -20%); }
        }

        /* 5. 预约按钮样式（透明底） */
        .btn-layer {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 7;
        }
        .reserve-btn {
            width: 300px;
            height: 80px;
            border: none;
            cursor: pointer;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            font-size: 0;
            background-color: transparent; /* 强制透明背景，解决白底问题 */
            outline: none; /* 移除默认轮廓 */
        }
        /* 成为管理员按钮（默认状态） */
        .btn-admin {
            background-image: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bottom-1.png");
        }
        /* 预约成功按钮（切换状态） */
        .btn-success {
            background-image: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bottom-2.png");
            display: none;
        }

        /* 6. 弹窗样式（含黑色遮罩，移除按钮） */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 600px;
            height: 700px;
            background: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/tanchuang.png") center center no-repeat;
            background-size: 100% 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 120px;
        }
        /* 移除弹窗按钮容器 */
        .modal-btns {
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 1. 背景图 -->
        <div class="bg-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bg_1.png" alt="背景图" class="bg-img">
        </div>

        <!-- 2. 导航栏 -->
        <div class="nav-bar">
            <div class="nav-items">
                <div class="nav-item active">官网首页</div>
                <div class="nav-item">魔法小镇</div>
                <div class="nav-logo"></div> <!-- Logo 中间位置 -->
                <div class="nav-item">游戏特色</div>
                <div class="nav-item">小镇简报</div>
            </div>
        </div>

        <!-- 3. 大标题 -->
        <div class="title-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/slogan.png" alt="大标题" class="title-img">
        </div>

        <!-- 4. 魔法书（移除粒子光效元素） -->
        <div class="magic-book-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/book.png" alt="魔法书" class="magic-book">
        </div>

        <!-- 5. 预约按钮 -->
        <div class="btn-layer">
            <button class="reserve-btn btn-admin" id="adminBtn">成为管理员</button>
            <button class="reserve-btn btn-success" id="successBtn">预约成功</button>
        </div>

        <!-- 6. 弹窗（含遮罩，已移除按钮） -->
        <div class="modal-mask" id="modalMask">
            <div class="modal-content">
                <div class="modal-btns">
                    <button class="modal-btn" id="groupBtn">加入官群</button>
                    <button class="modal-btn" id="returnBtn">确认返回</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const adminBtn = document.getElementById('adminBtn');
        const successBtn = document.getElementById('successBtn');
        const modalMask = document.getElementById('modalMask');
        const returnBtn = document.getElementById('returnBtn');
        const navItems = document.querySelectorAll('.nav-item');

        // 1. 导航栏选中效果
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                // 移除所有选中状态
                navItems.forEach(nav => nav.classList.remove('active'));
                // 添加当前选中状态
                item.classList.add('active');
            });
        });

        // 2. 点击「成为管理员」弹出弹窗
        adminBtn.addEventListener('click', () => {
            modalMask.style.display = 'flex';
        });

        // 3. 点击「确认返回」关闭弹窗，切换按钮状态
        returnBtn.addEventListener('click', () => {
            modalMask.style.display = 'none';
            adminBtn.style.display = 'none';
            successBtn.style.display = 'block';
        });

        // 4. 「加入官群」按钮点击事件（可扩展跳转逻辑）
        document.getElementById('groupBtn').addEventListener('click', () => {
            alert('已跳转至官群页面！');
        });
    </script>
</body>
</html>
