<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书境传奇 - 官网首页</title>
    <style>
        /* 1. 自定义字体引入（替换为你的字体文件路径） */
        @font-face {
            font-family: 'GameCustomFont'; /* 自定义字体名称 */
            src: url('font/CangErYuYangTiW01-2.ttf') format('truetype'),
                 url('./game-font.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'GameCustomFont', "Microsoft Yahei", sans-serif;
        }

        /* 页面基础容器（适配浏览器窗口） */
        .page-container {
            width: 100vw;
            height: 100vh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        /* 2. 背景图样式（适配浏览器） */
        .bg-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .bg-img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        /* 3. 导航栏样式（置顶+文案上移+hover放大） */
        .nav-bar {
            width: 100%;
            height: 204px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
            background: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/top.png") center center no-repeat;
            background-size: 100% 100%;
        }
        .nav-items {
            width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* 核心修改：导航项容器拆分层级 */
        .nav-item {
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 10px 20px;
            position: relative;
            transition: all 0.3s ease;
            z-index: 101; /* 文本层级更高 */
            transform-origin: center;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 底标容器（单独层级，低于文本） */
        .nav-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translate(-50%) scale(10);
            width: 30px;
            height: 10px;
            background: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/xuanz.png") center center no-repeat;
            background-size: 100% 100%;
            box-sizing: border-box;
            z-index: 100; /* 底标层级低于文本（100 < 101） */
            opacity: 0; /* 默认隐藏 */
        }
        /* 选中时显示底标 */
        .nav-item.active::after {
            opacity: 1; /* 显示底标 */
        }
        /* 导航hover放大效果 */
        .nav-item:hover {
            transform: scale(1.1);
        }
        /* 导航选中效果 */
        .nav-item.active {
            font-size: 22px;
            color: #ffd700;
            font-weight: bold;
            transform: scale(1.1);
        }
        /* Logo 容器 */
        .nav-logo {
            width: 120px;
            height: 80px;
            background: url("./logo.png") center center no-repeat;
            background-size: contain;
            z-index: 101; /* Logo层级与文本一致 */
        }

        /* 4. 大标题样式（调整位置避免重叠） */
        .title-layer {
            position: absolute;
            top: 18%; /* 轻微上移，给魔法书留出空间 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }
        .title-img {
            width: 800px;
            height: auto;
        }

        /* 5. 魔法书样式（下移+仅悬浮+无发光） */
        .magic-book-layer {
            position: absolute;
            top: 45%; /* 从40%改为50%，明显下移 */
            left: 50%;
            transform: translate(-50%, -20%);
            z-index: 6;
            animation: float 3s ease-in-out infinite;
        }
        .magic-book {
            width: 300px;
            height: auto;
            position: relative;
        }
        /* 悬浮动画 */
        @keyframes float {
            0% { transform: translate(-50%, -20%); }
            50% { transform: translate(-50%, -15%); }
            100% { transform: translate(-50%, -20%); }
        }

        /* 6. 预约按钮样式（下移+透明底+hover放大） */
        .btn-layer {
            position: absolute;
            bottom: 8%; /* 从20%改为12%，下移且远离魔法书 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 7;
        }
        .reserve-btn {
            width: 300px;
            height: 80px;
            border: none;
            cursor: pointer;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            font-size: 0;
            background-color: transparent;
            outline: none;
            transition: all 0.3s ease; /* 平滑过渡 */
            transform-origin: center;
        }
        /* 按钮hover放大效果 */
        .reserve-btn:hover {
            transform: scale(1.08); /* 按钮放大1.08倍，更柔和 */
        }
        /* 成为管理员按钮 */
        .btn-admin {
            background-image: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bottom-1.png");
        }
        /* 预约成功按钮 */
        .btn-success {
            background-image: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bottom-2.png");
            display: none;
        }

        /* 7. 弹窗样式（点击空白关闭+无按钮） */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* 空白处显示点击光标 */
        }
        .modal-content {
            width: 600px;
            height: 700px;
            background: url("https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/tanchuang.png") center center no-repeat;
            background-size: 100% 100%;
            position: relative;
            cursor: default; /* 弹窗内容区恢复默认光标 */
        }
        /* 移除弹窗按钮容器 */
        .modal-btns {
            display: none;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 背景图 -->
        <div class="bg-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/bg_1.png" alt="背景图" class="bg-img">
        </div>

        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-items">
                <div class="nav-item active">官网首页</div>
                <div class="nav-item">魔法小镇</div>
                <div class="nav-logo"></div>
                <div class="nav-item">游戏特色</div>
                <div class="nav-item">小镇简报</div>
            </div>
        </div>

        <!-- 大标题 -->
        <div class="title-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/slogan.png" alt="大标题" class="title-img">
        </div>

        <!-- 魔法书 -->
        <div class="magic-book-layer">
            <img src="https://raw.githubusercontent.com/RooonX/Disney/refs/heads/main/images/01/book.png" alt="魔法书" class="magic-book">
        </div>

        <!-- 预约按钮 -->
        <div class="btn-layer">
            <button class="reserve-btn btn-admin" id="adminBtn">成为管理员</button>
            <button class="reserve-btn btn-success" id="successBtn">预约成功</button>
        </div>

        <!-- 弹窗 -->
        <div class="modal-mask" id="modalMask">
            <div class="modal-content" id="modalContent">
                <div class="modal-btns">
                    <button class="modal-btn" id="groupBtn">加入官群</button>
                    <button class="modal-btn" id="returnBtn">确认返回</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const adminBtn = document.getElementById('adminBtn');
        const successBtn = document.getElementById('successBtn');
        const modalMask = document.getElementById('modalMask');
        const modalContent = document.getElementById('modalContent');
        const returnBtn = document.getElementById('returnBtn');
        const navItems = document.querySelectorAll('.nav-item');

        // 1. 导航栏选中效果
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
            });
        });

        // 2. 点击「成为管理员」弹出弹窗
        adminBtn.addEventListener('click', () => {
            modalMask.style.display = 'flex';
        });

        // 3. 弹窗点击空白处关闭（点击遮罩层关闭，点击内容区不关闭）
        modalMask.addEventListener('click', (e) => {
            if (e.target === modalMask) {
                modalMask.style.display = 'none';
                // 关闭弹窗后切换按钮状态
                adminBtn.style.display = 'none';
                successBtn.style.display = 'block';
            }
        });

        // 4. 兼容原来的确认返回按钮（保留，防止影响逻辑）
        returnBtn.addEventListener('click', () => {
            modalMask.style.display = 'none';
            adminBtn.style.display = 'none';
            successBtn.style.display = 'block';
        });

        // 5. 加入官群按钮（保留扩展能力）
        document.getElementById('groupBtn').addEventListener('click', () => {
            alert('已跳转至官群页面！');
        });
    </script>
</body>
</html>
